<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Browse tasks — SkillBridge</title>
<link rel="stylesheet" href="/static/css/skillbridge.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
  <div class="brand">SkillBridge</div>
  <div class="nav-links">
    <a href="/browse">Browse</a>
    <a href="/search">Search</a>
    <a href="/post-task">Post task</a>
    <a href="/ratings">Ratings</a>
    <a href="/profile">Profile</a>
    <button class="logout-btn" onclick="logout()">Log out</button>
  </div>
</nav>

<div class="page">
  <div class="container">

    <div class="page-header fade-in">
      <div class="eyebrow">The Board</div>
      <h1>Browse open tasks</h1>
      <p class="subtitle">Everything campus students are currently looking for help with.</p>
    </div>

    <div id="msg" class="msg"></div>

    <div id="tasksContainer">
      <div class="loading">Loading tasks</div>
    </div>

  </div>
</div>

<script src="/static/js/auth.js"></script>
<script>
const userId = getUserId();

function showMsg(text, type) {
  const m = document.getElementById('msg');
  m.textContent = text;
  m.className = 'msg ' + type;
  m.style.display = 'block';
  setTimeout(() => m.style.display = 'none', 3000);
}

async function logout() {
  try {
    await authFetch(`${API}/auth/logout`, { method: 'POST' });
  } catch(e) {}
  clearAuth();
  window.location.href = '/login';
}

async function applyTask(taskId) {
  if (!getToken()) return window.location.href = '/login';
  const msg = prompt('Write a short message for the task poster:') || '';
  try {
    const res = await authFetch(`${API}/tasks/${taskId}/apply?message=${encodeURIComponent(msg)}`, {
      method: 'POST'
    });
    const data = await res.json();
    if (res.ok) showMsg('Application sent.', 'success');
    else showMsg(data.detail || 'Failed to apply', 'error');
  } catch(e) { showMsg('Error applying', 'error'); }
}

async function markComplete(taskId) {
  if (!getToken()) return window.location.href = '/login';
  if (!confirm('Mark this task as complete?')) return;
  try {
    const res = await authFetch(`${API}/tasks/${taskId}/complete`, { method: 'PATCH' });
    const data = await res.json();
    if (res.ok) { showMsg('Task marked complete.', 'success'); loadTasks(); }
    else showMsg(data.detail || 'Failed', 'error');
  } catch(e) { showMsg('Error', 'error'); }
}

function viewApplicants(taskId) {
  window.location.href = `/applicants?task_id=${taskId}`;
}

function viewDetail(taskId) {
  window.location.href = `/task_detail?id=${taskId}`;
}

function escape(s) {
  return (s ?? '').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function loadTasks() {
  try {
    const res = await authFetch(`${API}/tasks/`);
    const data = await res.json();
    const container = document.getElementById('tasksContainer');
    if (!data.tasks || data.tasks.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <i class="fa-solid fa-folder-open"></i>
          <h3>No tasks yet</h3>
          <p>Be the first — post a task and kick things off.</p>
        </div>`;
      return;
    }
    container.innerHTML = `<div class="tasks-grid">` + data.tasks.map((task, i) => {
      const isOwner = task.creator_id === userId;
      const tags = (task.tags || []).slice(0, 3).map(t => `<span class="tag">${escape(t)}</span>`).join('');
      return `
      <div class="task-card fade-in" style="animation-delay: ${0.04 * i}s">
        <div class="task-card-header">
          <h3>${escape(task.title)}</h3>
          <span class="badge badge-${task.status}">${task.status.replace('_',' ')}</span>
        </div>
        <p class="task-desc">${escape(task.description) || 'No description'}</p>
        <div class="task-meta">
          <span class="budget"><i class="fa-solid fa-coins"></i> Rs. ${escape(task.budget) || '—'}</span>
          <span><i class="fa-solid fa-user"></i> ${escape(task.creator?.full_name || task.creator?.username || 'Unknown')}</span>
        </div>
        ${tags ? `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">${tags}</div>` : ''}
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-ghost btn-sm" onclick="viewDetail('${task.id}')">
            <i class="fa-solid fa-arrow-right"></i> Details
          </button>
          ${task.status === 'open' && !isOwner ? `
            <button class="btn btn-primary btn-sm" onclick="applyTask('${task.id}')">
              <i class="fa-solid fa-paper-plane"></i> Apply
            </button>` : ''}
          ${isOwner ? `
            <button class="btn btn-secondary btn-sm" onclick="viewApplicants('${task.id}')">
              <i class="fa-solid fa-users"></i> Applicants
            </button>` : ''}
          ${isOwner && task.status === 'open' ? `
            <button class="btn btn-success btn-sm" onclick="markComplete('${task.id}')">
              <i class="fa-solid fa-check"></i> Complete
            </button>` : ''}
        </div>
      </div>`;
    }).join('') + `</div>`;
  } catch(e) {
    document.getElementById('tasksContainer').innerHTML = `
      <div class="empty-state">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <h3>Couldn't load tasks</h3>
        <p>Check your connection and try again.</p>
      </div>`;
  }
}

loadTasks();
</script>
</body>
</html>
