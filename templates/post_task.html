<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Post a task — SkillBridge</title>
<link rel="stylesheet" href="/static/css/skillbridge.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
  <div class="brand">SkillBridge</div>
  <div class="nav-links">
    <a href="/browse">Browse</a>
    <a href="/search">Search</a>
    <a href="/post-task">Post task</a>
    <a href="/profile">Profile</a>
    <button class="logout-btn" onclick="logout()">Log out</button>
  </div>
</nav>

<div class="page">
  <div class="container" style="max-width: 680px">

    <div class="page-header fade-in">
      <div class="eyebrow">New Listing</div>
      <h1>Post a micro-task</h1>
      <p class="subtitle">Tell us what you need done — someone on campus can probably help.</p>
    </div>

    <div id="msg" class="msg"></div>

    <div class="card fade-in">
      <form id="postTaskForm">

        <div class="field">
          <label>Task title</label>
          <div class="input-group">
            <i class="fa-solid fa-pen"></i>
            <input type="text" id="title" placeholder="e.g. Help me build a FastAPI login endpoint" required minlength="5">
          </div>
        </div>

        <div class="field">
          <label>Description</label>
          <textarea id="description" placeholder="What's the task, what's the deliverable, and what does 'done' look like?" required minlength="10"></textarea>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:0 14px" class="edit-grid">
          <div class="field">
            <label>Category</label>
            <div class="input-group">
              <i class="fa-solid fa-layer-group"></i>
              <input type="text" id="category" placeholder="Programming, Design, Writing..." required>
            </div>
          </div>

          <div class="field">
            <label>Budget (Rs.)</label>
            <div class="input-group">
              <i class="fa-solid fa-coins"></i>
              <input type="number" step="0.01" id="budget" placeholder="1500" required>
            </div>
          </div>
        </div>

        <div class="field">
          <label>Deadline <span style="color:var(--text-3); font-weight:400">(optional)</span></label>
          <div class="input-group">
            <i class="fa-solid fa-calendar"></i>
            <input type="datetime-local" id="deadline">
          </div>
        </div>

        <div class="field">
          <label>Tags <span style="color:var(--text-3); font-weight:400">(comma-separated)</span></label>
          <div class="input-group">
            <i class="fa-solid fa-tags"></i>
            <input type="text" id="tags" placeholder="python, fastapi, api">
          </div>
        </div>

        <div class="mt-4">
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="postBtn">
            <i class="fa-solid fa-rocket"></i> Post task
          </button>
        </div>
      </form>
    </div>

  </div>
</div>

<script src="/static/js/auth.js"></script>
<script>
if (!getToken()) window.location.href = '/login';

function logout() {
  clearAuth();
  window.location.href = '/login';
}

document.getElementById('postTaskForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const msg = document.getElementById('msg');
  const btn = document.getElementById('postBtn');
  msg.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = 'Posting...';

  const tagsRaw = document.getElementById('tags').value;
  const tagsArray = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(t => t) : [];
  const deadline = document.getElementById('deadline').value;

  const data = {
    title: document.getElementById('title').value,
    description: document.getElementById('description').value,
    category: document.getElementById('category').value,
    budget: parseFloat(document.getElementById('budget').value),
    tags: tagsArray,
    deadline: deadline ? new Date(deadline).toISOString() : null
  };

  try {
    const res = await authFetch(`${API}/tasks/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    const result = await res.json();
    if (res.ok) {
      msg.textContent = 'Task posted. Redirecting...';
      msg.className = 'msg success';
      msg.style.display = 'block';
      setTimeout(() => window.location.href = '/browse', 1200);
    } else {
      msg.textContent = result.detail || 'Failed to post task.';
      msg.className = 'msg error';
      msg.style.display = 'block';
    }
  } catch(e) {
    msg.textContent = 'Cannot connect to server.';
    msg.className = 'msg error';
    msg.style.display = 'block';
  }
  btn.disabled = false;
  btn.innerHTML = '<i class="fa-solid fa-rocket"></i> Post task';
});
</script>
</body>
</html>
