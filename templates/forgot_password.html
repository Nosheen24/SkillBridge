<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkillBridge - Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/login.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  .msg { padding:12px; border-radius:8px; margin-bottom:16px; display:none; }
  .success { background:#e0f7e9; color:#2e7d32; }
  .error { background:#fdecea; color:#c62828; }
</style>
</head>
<body>
<div class="navbar">
  <h1>SkillBridge</h1>
  <div>
    <a href="/login">Login</a>
    <a href="/register">Register</a>
  </div>
</div>
<div class="main">
  <div class="container">
    <h2>Reset Password</h2>
    <p class="tagline">Enter your email to receive a reset link</p>
    <div id="msg" class="msg"></div>
    <form id="resetForm">
      <label>Email</label>
      <div class="input-group">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" id="email" placeholder="Enter your email" required>
      </div>
      <button type="submit" id="resetBtn">Send Reset Link</button>
    </form>
    <div class="login">
      Remember password? <a href="/login">Login</a>
    </div>
  </div>
</div>
<script>
const API = 'http://127.0.0.1:8000';
document.getElementById('resetForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const btn = document.getElementById('resetBtn');
  const msg = document.getElementById('msg');
  btn.textContent = 'Sending...'; btn.disabled = true;
  msg.style.display = 'none';
  try {
    const res = await fetch(`${API}/auth/password-reset`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    if (res.ok) {
      msg.textContent = 'Reset link sent! Check your email.';
      msg.className = 'msg success'; msg.style.display = 'block';
    } else {
      msg.textContent = data.detail || 'Failed to send reset link.';
      msg.className = 'msg error'; msg.style.display = 'block';
    }
  } catch(e) {
    msg.textContent = 'Cannot connect to server.';
    msg.className = 'msg error'; msg.style.display = 'block';
  }
  btn.textContent = 'Send Reset Link'; btn.disabled = false;
});
</script>
</body>
</html>
