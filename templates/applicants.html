<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Applicants — SkillBridge</title>
<link rel="stylesheet" href="/static/css/skillbridge.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
  <div class="brand">SkillBridge</div>
  <div class="nav-links">
    <a href="/browse">Browse</a>
    <a href="/search">Search</a>
    <a href="/post-task">Post task</a>
    <a href="/profile">Profile</a>
    <button class="logout-btn" onclick="logout()">Log out</button>
  </div>
</nav>

<div class="page">
  <div class="container" style="max-width:820px">
    <a href="/browse" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to tasks</a>

    <div class="page-header fade-in">
      <div class="eyebrow">Inbound</div>
      <h1>Applicants</h1>
      <p class="subtitle">Review who applied and pick your collaborator.</p>
    </div>

    <div id="msg" class="msg"></div>

    <div id="applicantsContainer">
      <div class="loading">Loading applicants</div>
    </div>
  </div>
</div>

<script src="/static/js/auth.js"></script>
<script>
const taskId = new URLSearchParams(window.location.search).get('task_id') || new URLSearchParams(window.location.search).get('id');

function logout() {
  clearAuth();
  window.location.href = '/login';
}

function showMsg(text, type) {
  const m = document.getElementById('msg');
  m.textContent = text;
  m.className = 'msg ' + type;
  m.style.display = 'block';
  setTimeout(() => m.style.display = 'none', 3000);
}

function escape(s) {
  return (s ?? '').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function decide(applicationId, decision) {
  try {
    const res = await authFetch(`${API}/tasks/${taskId}/applications/${applicationId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ decision })
    });
    const data = await res.json();
    if (res.ok) {
      showMsg(`Applicant ${decision}.`, 'success');
      loadApplicants();
    } else {
      showMsg(data.detail || 'Action failed', 'error');
    }
  } catch(e) { showMsg('Error processing decision', 'error'); }
}

async function loadApplicants() {
  if (!getToken()) return window.location.href = '/login';
  if (!taskId) {
    document.getElementById('applicantsContainer').innerHTML = `
      <div class="empty-state">
        <i class="fa-solid fa-circle-question"></i>
        <h3>No task selected</h3>
        <p>Head back and pick a task to view its applicants.</p>
      </div>`;
    return;
  }
  try {
    const res = await authFetch(`${API}/tasks/${taskId}/applicants`);
    const data = await res.json();
    const container = document.getElementById('applicantsContainer');

    if (!res.ok) {
      container.innerHTML = `
        <div class="empty-state">
          <i class="fa-solid fa-triangle-exclamation"></i>
          <h3>Couldn't load</h3>
          <p>${escape(data.detail)}</p>
        </div>`;
      return;
    }

    if (!data.applicants || data.applicants.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <i class="fa-solid fa-inbox"></i>
          <h3>No applicants yet</h3>
          <p>Sit tight — once someone applies they'll show up here.</p>
        </div>`;
      return;
    }

    container.innerHTML = `
      <div class="results-header">
        <div class="count"><strong>${data.total_applicants}</strong> ${data.total_applicants === 1 ? 'applicant' : 'applicants'}</div>
      </div>
      ${data.applicants.map((app, i) => `
        <div class="applicant-card fade-in" style="animation-delay:${0.05 * i}s">
          <div class="header">
            <h3>${escape(app.profiles?.full_name || app.profiles?.username || 'Unknown')}</h3>
            <span class="badge badge-${app.status}">${escape(app.status)}</span>
          </div>
          <div class="meta-row">
            <span><i class="fa-solid fa-envelope"></i> <strong>${escape(app.profiles?.email) || 'N/A'}</strong></span>
            <span><i class="fa-solid fa-graduation-cap"></i> <strong>${escape(app.profiles?.university) || 'N/A'}</strong></span>
          </div>
          ${app.message ? `<div class="message-box">"${escape(app.message)}"</div>` : `<p class="text-muted text-sm" style="margin-bottom:14px">No message provided.</p>`}
          ${app.status === 'pending' ? `
            <div class="actions">
              <button class="btn btn-success btn-sm" onclick="decide('${app.id}', 'accepted')">
                <i class="fa-solid fa-check"></i> Accept
              </button>
              <button class="btn btn-danger btn-sm" onclick="decide('${app.id}', 'rejected')">
                <i class="fa-solid fa-xmark"></i> Reject
              </button>
            </div>` : ''}
        </div>
      `).join('')}`;
  } catch(e) {
    document.getElementById('applicantsContainer').innerHTML = `
      <div class="empty-state">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <h3>Error loading</h3>
      </div>`;
  }
}

loadApplicants();
</script>
</body>
</html>
