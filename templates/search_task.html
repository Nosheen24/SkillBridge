<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Search — SkillBridge</title>
<link rel="stylesheet" href="/static/css/skillbridge.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
  <div class="brand">SkillBridge</div>
  <div class="nav-links">
    <a href="/browse">Browse</a>
    <a href="/search">Search</a>
    <a href="/post-task">Post task</a>
    <a href="/profile">Profile</a>
    <button class="logout-btn" onclick="logout()">Log out</button>
  </div>
</nav>

<div class="page">
  <div class="container">

    <div class="page-header fade-in">
      <div class="eyebrow">Find Work</div>
      <h1>Search tasks</h1>
      <p class="subtitle">Narrow by keyword, category, or budget range.</p>
    </div>

    <div class="card fade-in" style="margin-bottom: 24px">
      <form id="searchForm" onsubmit="handleSearch(event)">
        <div class="field">
          <label>Keyword</label>
          <div class="input-group">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="keyword" placeholder="Search title or description">
          </div>
        </div>

        <div class="filter-grid">
          <div class="field" style="margin-bottom:0">
            <label>Category</label>
            <div class="input-group">
              <i class="fa-solid fa-layer-group"></i>
              <input type="text" id="category" placeholder="e.g. Design">
            </div>
          </div>

          <div class="field" style="margin-bottom:0">
            <label>Min budget</label>
            <div class="input-group">
              <i class="fa-solid fa-coins"></i>
              <input type="number" step="0.01" id="min_budget" placeholder="0">
            </div>
          </div>

          <div class="field" style="margin-bottom:0">
            <label>Max budget</label>
            <div class="input-group">
              <i class="fa-solid fa-coins"></i>
              <input type="number" step="0.01" id="max_budget" placeholder="10000">
            </div>
          </div>

          <div class="field" style="margin-bottom:0">
            <label>Status</label>
            <select id="status_filter">
              <option value="open">Open</option>
              <option value="in_progress">In progress</option>
              <option value="completed">Completed</option>
            </select>
          </div>
        </div>

        <div class="mt-4">
          <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-magnifying-glass"></i> Search tasks
          </button>
        </div>
      </form>
    </div>

    <div id="msg" class="msg"></div>

    <div id="resultsSection" style="display:none">
      <div class="results-header">
        <div class="count"><strong id="resultsCount">0</strong> <span id="resultsLabel">results</span> found</div>
      </div>
      <div id="tasksGrid"></div>
    </div>

  </div>
</div>

<script src="/static/js/auth.js"></script>
<script>
const userId = getUserId();

function showMsg(text, type) {
  const m = document.getElementById('msg');
  m.textContent = text;
  m.className = 'msg ' + type;
  m.style.display = 'block';
  setTimeout(() => m.style.display = 'none', 3000);
}

async function logout() {
  try { await authFetch(`${API}/auth/logout`, { method: 'POST' }); } catch(e) {}
  clearAuth();
  window.location.href = '/login';
}

function escape(s) {
  return (s ?? '').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function handleSearch(e) {
  e.preventDefault();

  const keyword = document.getElementById('keyword').value.trim();
  const category = document.getElementById('category').value.trim();
  const min_budget = document.getElementById('min_budget').value;
  const max_budget = document.getElementById('max_budget').value;
  const status = document.getElementById('status_filter').value;

  const params = new URLSearchParams();
  if (keyword) params.set('keyword', keyword);
  if (category) params.set('category', category);
  if (min_budget) params.set('min_budget', min_budget);
  if (max_budget) params.set('max_budget', max_budget);
  if (status) params.set('status_filter', status);

  const section = document.getElementById('resultsSection');
  const grid = document.getElementById('tasksGrid');

  section.style.display = 'block';
  grid.innerHTML = '<div class="loading">Searching</div>';

  try {
    const res = await authFetch(`${API}/tasks/search?${params}`);
    const data = await res.json();

    if (!res.ok) { showMsg(data.detail || 'Search failed', 'error'); grid.innerHTML = ''; return; }

    const tasks = data.tasks || [];
    document.getElementById('resultsCount').textContent = data.total ?? tasks.length;
    document.getElementById('resultsLabel').textContent = (tasks.length === 1 ? 'result' : 'results');

    if (tasks.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <i class="fa-solid fa-magnifying-glass"></i>
          <h3>No matches</h3>
          <p>Try widening your filters or removing the keyword.</p>
        </div>`;
      return;
    }

    grid.innerHTML = `<div class="tasks-grid">` + tasks.map((task, i) => {
      const tags = (task.tags || []).slice(0, 3).map(t => `<span class="tag">${escape(t)}</span>`).join('');
      const canApply = getToken() && task.status === 'open' && task.creator_id !== userId;
      return `
        <div class="task-card fade-in" style="animation-delay:${0.04 * i}s">
          <div class="task-card-header">
            <h3>${escape(task.title)}</h3>
            <span class="badge badge-${task.status}">${task.status.replace('_',' ')}</span>
          </div>
          <p class="task-desc">${escape(task.description) || 'No description'}</p>
          <div class="task-meta">
            <span class="budget"><i class="fa-solid fa-coins"></i> Rs. ${escape(task.budget)}</span>
            <span><i class="fa-solid fa-user"></i> ${escape(task.creator?.full_name || task.creator?.username || 'Unknown')}</span>
            ${task.category ? `<span><i class="fa-solid fa-tag"></i> ${escape(task.category)}</span>` : ''}
          </div>
          ${tags ? `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">${tags}</div>` : ''}
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-ghost btn-sm" onclick="window.location.href='/task_detail?id=${task.id}'">
              <i class="fa-solid fa-arrow-right"></i> Details
            </button>
            ${canApply
              ? `<button class="btn btn-primary btn-sm" onclick="applyTask('${task.id}', this)">
                   <i class="fa-solid fa-paper-plane"></i> Apply
                 </button>`
              : !getToken()
                ? `<button class="btn btn-primary btn-sm" onclick="window.location.href='/login'">Log in to apply</button>`
                : ''}
          </div>
        </div>`;
    }).join('') + `</div>`;

  } catch(e) {
    showMsg('Error connecting to server', 'error');
    grid.innerHTML = '';
  }
}

async function applyTask(taskId, btn) {
  if (!getToken()) return window.location.href = '/login';
  const msg = prompt('Write a short message for the task poster:') || '';
  btn.disabled = true;
  btn.innerHTML = 'Applying...';
  try {
    const res = await authFetch(`${API}/tasks/${taskId}/apply?message=${encodeURIComponent(msg)}`, {
      method: 'POST'
    });
    const data = await res.json();
    if (res.ok) {
      showMsg('Application sent.', 'success');
      btn.innerHTML = '<i class="fa-solid fa-check"></i> Applied';
    } else {
      showMsg(data.detail || 'Failed to apply', 'error');
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Apply';
    }
  } catch(e) {
    showMsg('Error applying', 'error');
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Apply';
  }
}

// Auto-search if URL has query params
(function() {
  const p = new URLSearchParams(window.location.search);
  if (p.toString()) {
    if (p.get('keyword')) document.getElementById('keyword').value = p.get('keyword');
    if (p.get('category')) document.getElementById('category').value = p.get('category');
    if (p.get('min_budget')) document.getElementById('min_budget').value = p.get('min_budget');
    if (p.get('max_budget')) document.getElementById('max_budget').value = p.get('max_budget');
    if (p.get('status_filter')) document.getElementById('status_filter').value = p.get('status_filter');
    document.getElementById('searchForm').dispatchEvent(new Event('submit'));
  }
})();
</script>
</body>
</html>
