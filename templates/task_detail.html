<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Task detail — SkillBridge</title>
<link rel="stylesheet" href="/static/css/skillbridge.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
  <div class="brand">SkillBridge</div>
  <div class="nav-links">
    <a href="/browse">Browse</a>
    <a href="/search">Search</a>
    <a href="/post-task">Post task</a>
    <a href="/profile">Profile</a>
    <button class="logout-btn" onclick="logout()">Log out</button>
  </div>
</nav>

<div class="page">
  <div class="container" style="max-width: 760px">
    <a href="/browse" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to tasks</a>

    <div class="task-detail-card fade-in" id="taskCard">
      <div class="loading">Loading task</div>
    </div>
  </div>
</div>

<script src="/static/js/auth.js"></script>
<script>
const currentUserId = getUserId();
const urlParams = new URLSearchParams(window.location.search);
const taskId = urlParams.get('id');

if (!getToken()) window.location.href = '/login';
if (!taskId) window.location.href = '/browse';

function escape(s) {
  return (s ?? '').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function loadTask() {
  try {
    const res = await authFetch(`${API}/tasks/${taskId}`);
    const task = await res.json();
    if (!res.ok) throw new Error(task.detail || 'Failed to load task');
    renderTask(task);
  } catch (err) {
    document.getElementById('taskCard').innerHTML = `
      <div class="empty-state">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <h3>Couldn't load task</h3>
        <p>${escape(err.message)}</p>
      </div>`;
  }
}

function renderTask(task) {
  const isOwner = task.creator_id === currentUserId;
  const isCompleted = task.status === 'completed';
  const deadline = task.deadline ? new Date(task.deadline).toLocaleDateString(undefined, {year:'numeric',month:'short',day:'numeric'}) : 'No deadline';
  const tags = (task.tags || []).map(t => `<span class="tag">${escape(t)}</span>`).join('');

  let actionsHTML = '';

  if (isOwner) {
    actionsHTML = `
      <div class="action-section">
        <div class="section-label">Your task — manage it</div>
        <div id="actionMsg" class="msg success"></div>
        <div id="actionErr" class="msg error"></div>
        <div style="display:flex; gap:10px; flex-wrap:wrap">
          ${!isCompleted ? `
            <button class="btn btn-success" onclick="markComplete()">
              <i class="fa-solid fa-check"></i> Mark complete
            </button>` : `
            <span class="badge badge-completed" style="padding:8px 14px">
              <i class="fa-solid fa-circle-check"></i> Completed
            </span>`}
          <a href="/applicants?task_id=${task.id}" class="btn btn-secondary">
            <i class="fa-solid fa-users"></i> View applicants
          </a>
        </div>
        ${isCompleted ? `
        <div style="margin-top:16px;padding:14px;background:var(--bg-3);border-radius:var(--r-md);border:1px solid var(--border)">
          <p style="font-size:0.78rem;color:var(--text-3);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em">IDs for rating</p>
          <p style="font-size:0.82rem;color:var(--text-2);margin-bottom:6px">Task ID: <code style="color:var(--accent);font-size:0.8rem;word-break:break-all">${task.id}</code></p>
          ${task.assigned_to ? `<p style="font-size:0.82rem;color:var(--text-2);margin-bottom:10px">Freelancer ID: <code style="color:var(--accent);font-size:0.8rem;word-break:break-all">${task.assigned_to}</code></p>
          <a href="/ratings?user_id=${task.assigned_to}&task_id=${task.id}" class="btn btn-primary btn-sm">
            <i class="fa-solid fa-star"></i> Rate this freelancer
          </a>` : ""}
        </div>` : ""}
      </div>`;
  } else if (!isCompleted) {
    actionsHTML = `
      <div class="action-section">
        <div class="section-label">Apply for this task</div>
        <div id="applySuccess" class="msg success"></div>
        <div id="applyError" class="msg error"></div>
        <div class="field">
          <textarea id="applyMsg" placeholder="Why are you a good fit? Keep it short and specific."></textarea>
        </div>
        <button class="btn btn-primary" onclick="applyTask()">
          <i class="fa-solid fa-paper-plane"></i> Submit application
        </button>
      </div>`;
  } else {
    actionsHTML = `
      <div class="action-section">
        <p class="text-muted">This task is closed.</p>
      </div>`;
  }

  document.getElementById('taskCard').innerHTML = `
    <h1 class="task-detail-title">${escape(task.title)}</h1>
    <div class="task-detail-badges">
      <span class="badge badge-${task.status === 'completed' ? 'completed' : 'open'}">${escape(task.status) || 'open'}</span>
      ${task.category ? `<span class="tag">${escape(task.category)}</span>` : ''}
      ${tags}
    </div>
    <p class="task-detail-desc">${escape(task.description)}</p>
    <div class="task-detail-meta">
      <div class="meta-item budget">
        <span class="label"><i class="fa-solid fa-coins"></i> Budget</span>
        <span class="value">Rs. ${escape(task.budget) || '—'}</span>
      </div>
      <div class="meta-item">
        <span class="label"><i class="fa-solid fa-calendar"></i> Deadline</span>
        <span class="value">${escape(deadline)}</span>
      </div>
      <div class="meta-item">
        <span class="label"><i class="fa-solid fa-user"></i> Posted by</span>
        <span class="value">${escape(task.creator?.full_name || task.creator?.username || 'Unknown')}</span>
      </div>
      ${task.creator?.university ? `
      <div class="meta-item">
        <span class="label"><i class="fa-solid fa-graduation-cap"></i> University</span>
        <span class="value">${escape(task.creator.university)}</span>
      </div>` : ''}
    </div>
    ${actionsHTML}
  `;
}

async function applyTask() {
  const message = document.getElementById('applyMsg').value.trim();
  const sucDiv = document.getElementById('applySuccess');
  const errDiv = document.getElementById('applyError');
  sucDiv.style.display = 'none';
  errDiv.style.display = 'none';

  if (!message) {
    errDiv.textContent = 'Write a message before applying.';
    errDiv.style.display = 'block';
    return;
  }

  try {
    const res = await authFetch(`${API}/tasks/${taskId}/apply`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message })
    });
    const data = await res.json();
    if (res.ok) {
      sucDiv.textContent = 'Application submitted.';
      sucDiv.style.display = 'block';
      document.getElementById('applyMsg').value = '';
    } else {
      errDiv.textContent = data.detail || 'Failed to submit application.';
      errDiv.style.display = 'block';
    }
  } catch (err) {
    errDiv.textContent = 'Cannot connect to server.';
    errDiv.style.display = 'block';
  }
}

async function markComplete() {
  const sucDiv = document.getElementById('actionMsg');
  const errDiv = document.getElementById('actionErr');
  sucDiv.style.display = 'none';
  errDiv.style.display = 'none';

  if (!confirm('Mark this task as complete?')) return;

  try {
    const res = await authFetch(`${API}/tasks/${taskId}/complete`, { method: 'PATCH' });
    const data = await res.json();
    if (res.ok) {
      sucDiv.textContent = 'Task marked as complete.';
      sucDiv.style.display = 'block';
      setTimeout(() => loadTask(), 1000);
    } else {
      errDiv.textContent = data.detail || 'Failed to mark complete.';
      errDiv.style.display = 'block';
    }
  } catch (err) {
    errDiv.textContent = 'Cannot connect to server.';
    errDiv.style.display = 'block';
  }
}

function logout() {
  authFetch(`${API}/auth/logout`, { method: 'POST' }).finally(() => {
    clearAuth();
    window.location.href = '/login';
  });
}

loadTask();
</script>
</body>
</html>
