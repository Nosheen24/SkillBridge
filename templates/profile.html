<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Profile — SkillBridge</title>
<link rel="stylesheet" href="/static/css/skillbridge.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
  <div class="brand">SkillBridge</div>
  <div class="nav-links">
    <a href="/browse">Browse</a>
    <a href="/search">Search</a>
    <a href="/post-task">Post task</a>
    <a href="/profile">Profile</a>
    <button class="logout-btn" onclick="logout()">Log out</button>
  </div>
</nav>

<div class="page">
  <div class="container" style="max-width: 860px">

    <div id="msg" class="msg"></div>

    <div class="profile-header fade-in" id="profileHeader">
      <div class="avatar-wrap" onclick="document.getElementById('avatarFileInput').click()" title="Click to change photo">
        <div class="avatar" id="avatarEl">?</div>
        <div class="avatar-overlay"><i class="fa-solid fa-camera"></i></div>
      </div>
      <input type="file" id="avatarFileInput" accept="image/*" onchange="uploadAvatar(this)" style="display:none">
      <div class="profile-info">
        <h2 id="headerName">Loading...</h2>
        <p class="username" id="headerUsername"></p>
        <p class="email" id="headerEmail"></p>
        <p class="university" id="headerUniversity"></p>
      </div>
    </div>

    <div class="card fade-in">
      <div class="card-title"><i class="fa-solid fa-pen-to-square"></i> Personal information</div>

      <div class="edit-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:0 16px">
        <div class="field">
          <label>Full name</label>
          <div class="input-group">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="editFullName" placeholder="Your full name">
          </div>
        </div>
        <div class="field">
          <label>Username</label>
          <div class="input-group">
            <i class="fa-solid fa-at"></i>
            <input type="text" id="editUsername" placeholder="username">
          </div>
        </div>
        <div class="field">
          <label>University</label>
          <div class="input-group">
            <i class="fa-solid fa-graduation-cap"></i>
            <input type="text" id="editUniversity" placeholder="Your university">
          </div>
        </div>
        <div class="field">
          <label>Student ID</label>
          <div class="input-group">
            <i class="fa-solid fa-id-card"></i>
            <input type="text" id="editStudentId" placeholder="Student ID">
          </div>
        </div>
      </div>

      <button class="btn btn-primary btn-block" id="editBtn" onclick="editProfile()">
        <i class="fa-solid fa-floppy-disk"></i> Save changes
      </button>
    </div>

    <div class="card fade-in">
      <div class="card-title"><i class="fa-solid fa-sparkles"></i> Skill profile</div>

      <div class="field">
        <label>Skills <span style="color:var(--text-3); font-weight:400">(press Enter or comma to add)</span></label>
        <div class="tag-input-wrapper" id="tagWrapper" onclick="document.getElementById('tagInput').focus()">
          <input type="text" id="tagInput" placeholder="e.g. Python, Figma, Writing...">
        </div>
        <p class="tag-hint">Add at least one skill.</p>
      </div>

      <div class="field">
        <label>Experience</label>
        <textarea id="experience" placeholder="Describe your experience, projects, or background..."></textarea>
      </div>

      <div class="field">
        <label>Bio <span style="color:var(--text-3); font-weight:400">(max 500 chars)</span></label>
        <textarea id="bio" placeholder="A short line about yourself." style="min-height:80px" maxlength="500"></textarea>
      </div>

      <button class="btn btn-primary btn-block" id="saveBtn" onclick="saveProfile()">
        <i class="fa-solid fa-floppy-disk"></i> Save skill profile
      </button>
    </div>

    <div class="card fade-in">
      <div class="card-title"><i class="fa-solid fa-briefcase"></i> Portfolio</div>

      <div id="portfolioPreview" style="display:none" class="portfolio-preview">
        <i class="fa-solid fa-link"></i>
        <span id="portfolioPreviewText"></span>
      </div>

      <div class="portfolio-tabs">
        <button class="tab-btn active" onclick="switchTab('link')">Link</button>
        <button class="tab-btn" onclick="switchTab('file')">Upload file</button>
      </div>

      <div id="tab-link" class="tab-panel active">
        <div class="field">
          <label>Portfolio / GitHub / LinkedIn URL</label>
          <div class="input-group">
            <i class="fa-solid fa-link"></i>
            <input type="text" id="portfolioLink" placeholder="https://github.com/yourname">
          </div>
        </div>
        <button class="btn btn-primary" onclick="savePortfolioLink()">
          <i class="fa-solid fa-save"></i> Save link
        </button>
      </div>

      <div id="tab-file" class="tab-panel">
        <div class="field">
          <label>Upload PDF or image</label>
          <input type="file" id="portfolioFile" accept=".pdf,.png,.jpg,.jpeg,.webp">
        </div>
        <button class="btn btn-primary" onclick="uploadPortfolio()">
          <i class="fa-solid fa-upload"></i> Upload file
        </button>
      </div>
    </div>

  </div>
</div>

<script src="/static/js/auth.js"></script>
<script>
if (!getToken()) window.location.href = '/login';

let skills = [];

/* ── tag input ── */
const tagInput = document.getElementById('tagInput');
const tagWrapper = document.getElementById('tagWrapper');

tagInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    addSkill(tagInput.value.trim().replace(/,$/, ''));
  } else if (e.key === 'Backspace' && tagInput.value === '' && skills.length) {
    removeSkill(skills[skills.length - 1]);
  }
});

tagInput.addEventListener('blur', () => {
  if (tagInput.value.trim()) addSkill(tagInput.value.trim());
});

function addSkill(val) {
  if (!val || skills.includes(val)) { tagInput.value = ''; return; }
  skills.push(val);
  tagInput.value = '';
  renderTags();
}

function removeSkill(val) {
  skills = skills.filter(s => s !== val);
  renderTags();
}

function renderTags() {
  const existing = tagWrapper.querySelectorAll('.skill-tag');
  existing.forEach(el => el.remove());
  skills.forEach(s => {
    const tag = document.createElement('div');
    tag.className = 'skill-tag';
    tag.innerHTML = `${s}<button type="button" onclick="removeSkill('${s.replace(/'/g,"\\'")}')">&times;</button>`;
    tagWrapper.insertBefore(tag, tagInput);
  });
}

/* ── messages ── */
function showMsg(text, type) {
  const m = document.getElementById('msg');
  m.textContent = text;
  m.className = 'msg ' + type;
  m.style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setTimeout(() => m.style.display = 'none', 3500);
}

/* ── avatar upload ── */
async function uploadAvatar(input) {
  const file = input.files[0];
  if (!file) return;
  const form = new FormData();
  form.append('file', file);
  showMsg('Uploading photo...', 'info');
  try {
    const res = await authFetch(`${API}/profile/me/avatar`, { method: 'POST', body: form });
    const data = await res.json();
    if (res.ok && data.avatar_url) {
      document.getElementById('avatarEl').innerHTML = `<img src="${data.avatar_url}?t=${Date.now()}" alt="Profile photo">`;
      showMsg('Profile photo updated.', 'success');
    } else {
      showMsg(data.detail || 'Upload failed', 'error');
    }
  } catch(e) { showMsg('Error uploading photo', 'error'); }
  input.value = '';
}

/* ── load profile ── */
async function loadProfile() {
  try {
    const res = await authFetch(`${API}/profile/me`);
    if (!res.ok) { showMsg('Failed to load profile', 'error'); return; }
    const p = await res.json();

    const initials = (p.full_name || p.username || p.email || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
    const avatarEl = document.getElementById('avatarEl');
    if (p.avatar_url) {
      avatarEl.innerHTML = `<img src="${p.avatar_url}" alt="Profile photo">`;
    } else {
      avatarEl.textContent = initials;
    }
    document.getElementById('headerName').textContent = p.full_name || p.username || 'No name set';
    document.getElementById('headerUsername').textContent = p.username ? `@${p.username}` : '';
    document.getElementById('headerEmail').textContent = p.email;
    document.getElementById('headerUniversity').textContent = p.university || '';

    document.getElementById('editFullName').value = p.full_name || '';
    document.getElementById('editUsername').value = p.username || '';
    document.getElementById('editUniversity').value = p.university || '';
    document.getElementById('editStudentId').value = p.student_id || '';

    if (p.skills && p.skills.length) {
      skills = [...p.skills];
      renderTags();
    }
    document.getElementById('experience').value = p.experience || '';
    document.getElementById('bio').value = p.bio || '';

    if (p.portfolio_link) {
      document.getElementById('portfolioLink').value = p.portfolio_link;
      showPortfolioPreview(`<a href="${p.portfolio_link}" target="_blank">${p.portfolio_link}</a>`);
    } else if (p.portfolio_url) {
      showPortfolioPreview(`<a href="${p.portfolio_url}" target="_blank">${p.portfolio_filename || 'View file'}</a>`);
    }

  } catch(e) { showMsg('Error loading profile', 'error'); }
}

function showPortfolioPreview(html) {
  const el = document.getElementById('portfolioPreview');
  document.getElementById('portfolioPreviewText').innerHTML = html;
  el.style.display = 'flex';
}

/* ── edit profile ── */
async function editProfile() {
  const btn = document.getElementById('editBtn');
  btn.disabled = true;
  btn.innerHTML = 'Saving...';

  const experience = document.getElementById('experience').value.trim();
  const bio = document.getElementById('bio').value.trim();

  const payload = {
    full_name:  document.getElementById('editFullName').value.trim(),
    username:   document.getElementById('editUsername').value.trim(),
    university: document.getElementById('editUniversity').value.trim(),
    student_id: document.getElementById('editStudentId').value.trim(),
    skills:     skills.length ? skills : ['—'],
    experience: experience || '—',
    bio:        bio || '—',
  };

  try {
    const res = await authFetch(`${API}/profile/me`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (res.ok) {
      showMsg('Profile updated.', 'success');
      document.getElementById('headerName').textContent = data.full_name || data.username || 'No name set';
      document.getElementById('headerUsername').textContent = data.username ? `@${data.username}` : '';
      document.getElementById('headerUniversity').textContent = data.university || '';
    } else {
      showMsg(data.detail || 'Failed to update', 'error');
    }
  } catch(e) { showMsg('Error updating profile', 'error'); }
  finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save changes';
  }
}

/* ── save skill profile ── */
async function saveProfile() {
  if (skills.length === 0) { showMsg('Add at least one skill', 'error'); return; }
  const experience = document.getElementById('experience').value.trim();
  const bio = document.getElementById('bio').value.trim();
  if (!experience) { showMsg('Experience is required', 'error'); return; }
  if (!bio) { showMsg('Bio is required', 'error'); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.innerHTML = 'Saving...';

  try {
    const res = await authFetch(`${API}/profile/me`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ skills, experience, bio })
    });
    const data = await res.json();
    if (res.ok) showMsg('Skill profile saved.', 'success');
    else showMsg(data.detail || 'Failed to save', 'error');
  } catch(e) { showMsg('Error saving profile', 'error'); }
  finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save skill profile';
  }
}

/* ── portfolio link ── */
async function savePortfolioLink() {
  const link = document.getElementById('portfolioLink').value.trim();
  if (!link) { showMsg('Enter a portfolio URL', 'error'); return; }
  try {
    const res = await authFetch(`${API}/profile/me/portfolio/link`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ portfolio_link: link })
    });
    const data = await res.json();
    if (res.ok) {
      showMsg('Portfolio link saved.', 'success');
      showPortfolioPreview(`<a href="${link}" target="_blank">${link}</a>`);
    } else showMsg(data.detail || 'Failed to save link', 'error');
  } catch(e) { showMsg('Error saving link', 'error'); }
}

/* ── portfolio upload ── */
async function uploadPortfolio() {
  const file = document.getElementById('portfolioFile').files[0];
  if (!file) { showMsg('Select a file first', 'error'); return; }
  const form = new FormData();
  form.append('file', file);
  try {
    const res = await authFetch(`${API}/profile/me/portfolio/upload`, { method: 'POST', body: form });
    const data = await res.json();
    if (res.ok) {
      showMsg('Portfolio uploaded.', 'success');
      if (data.portfolio_url) showPortfolioPreview(`<a href="${data.portfolio_url}" target="_blank">${data.portfolio_filename || 'View file'}</a>`);
    } else showMsg(data.detail || 'Upload failed', 'error');
  } catch(e) { showMsg('Error uploading file', 'error'); }
}

/* ── tabs ── */
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0 && tab==='link') || (i===1 && tab==='file')));
  document.getElementById('tab-link').classList.toggle('active', tab === 'link');
  document.getElementById('tab-file').classList.toggle('active', tab === 'file');
}

/* ── logout ── */
function logout() {
  authFetch(`${API}/auth/logout`, { method: 'POST' }).catch(() => {});
  clearAuth();
  window.location.href = '/login';
}

loadProfile();
</script>
</body>
</html>
