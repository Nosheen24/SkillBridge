<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkillBridge - My Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:Poppins,sans-serif; }
  body { background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; }

  /* Navbar */
  .navbar { display:flex; justify-content:space-between; align-items:center; padding:16px 40px; background:#6c63ff; }
  .navbar h1 { color:white; font-size:1.4rem; }
  .navbar a { color:white; text-decoration:none; margin-left:20px; font-size:0.9rem; }
  .logout-btn { background:#ff4d4d; border:none; color:white; padding:8px 16px; border-radius:8px; cursor:pointer; font-family:Poppins; margin-left:20px; }

  /* Layout */
  .page { max-width:860px; margin:36px auto; padding:0 20px 60px; }

  /* Profile header card */
  .profile-header { background:white; border-radius:16px; padding:30px; display:flex; align-items:center; gap:24px; margin-bottom:24px; box-shadow:0 4px 20px rgba(0,0,0,0.12); }
  .avatar-wrap { position:relative; flex-shrink:0; cursor:pointer; }
  .avatar { width:80px; height:80px; border-radius:50%; background:linear-gradient(135deg,#6c63ff,#a78bfa); display:flex; align-items:center; justify-content:center; color:white; font-size:2rem; font-weight:600; overflow:hidden; }
  .avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
  .avatar-overlay { position:absolute; inset:0; border-radius:50%; background:rgba(0,0,0,0.45); display:flex; align-items:center; justify-content:center; opacity:0; transition:0.2s; }
  .avatar-wrap:hover .avatar-overlay { opacity:1; }
  .avatar-overlay i { color:white; font-size:1.1rem; }
  #avatarFileInput { display:none; }
  .profile-info h2 { font-size:1.3rem; color:#1a1a1a; }
  .profile-info p { color:#666; font-size:0.9rem; margin-top:4px; }
  .profile-info .email { color:#6c63ff; font-size:0.85rem; margin-top:2px; }

  /* Section cards */
  .card { background:white; border-radius:16px; padding:28px; margin-bottom:20px; box-shadow:0 4px 20px rgba(0,0,0,0.1); }
  .card-title { font-size:1rem; font-weight:600; color:#1a1a1a; margin-bottom:20px; display:flex; align-items:center; gap:8px; }
  .card-title i { color:#6c63ff; }

  /* Form elements */
  label { font-size:13px; font-weight:500; color:#444; display:block; margin-bottom:6px; }
  .field { margin-bottom:18px; }
  input[type="text"], textarea, .tag-input-box {
    width:100%; padding:11px 14px; border:1.5px solid #e0e0e0; border-radius:10px;
    font-family:Poppins; font-size:14px; color:#333; outline:none; transition:border 0.2s;
  }
  input[type="text"]:focus, textarea:focus { border-color:#6c63ff; }
  textarea { resize:vertical; min-height:90px; }

  /* Skills tag input */
  .tag-input-wrapper { border:1.5px solid #e0e0e0; border-radius:10px; padding:8px 10px; display:flex; flex-wrap:wrap; gap:8px; cursor:text; transition:border 0.2s; }
  .tag-input-wrapper:focus-within { border-color:#6c63ff; }
  .skill-tag { background:#ede9ff; color:#6c63ff; padding:4px 10px; border-radius:20px; font-size:13px; display:flex; align-items:center; gap:6px; }
  .skill-tag button { background:none; border:none; color:#6c63ff; cursor:pointer; font-size:14px; line-height:1; padding:0; }
  .tag-input-wrapper input { border:none; outline:none; font-family:Poppins; font-size:13px; min-width:120px; flex:1; padding:2px 4px; }
  .tag-hint { font-size:11px; color:#999; margin-top:4px; }

  /* Buttons */
  .btn { padding:11px 28px; border:none; border-radius:10px; font-family:Poppins; font-size:14px; font-weight:500; cursor:pointer; transition:0.2s; }
  .btn-primary { background:#6c63ff; color:white; width:100%; }
  .btn-primary:hover { background:#5a52e0; }
  .btn-primary:disabled { background:#aaa; cursor:not-allowed; }

  /* Portfolio section */
  .portfolio-tabs { display:flex; gap:10px; margin-bottom:18px; }
  .tab-btn { padding:8px 20px; border-radius:8px; border:1.5px solid #e0e0e0; background:white; font-family:Poppins; font-size:13px; cursor:pointer; color:#555; transition:0.2s; }
  .tab-btn.active { background:#6c63ff; color:white; border-color:#6c63ff; }
  .tab-panel { display:none; }
  .tab-panel.active { display:block; }
  .portfolio-preview { margin-top:14px; padding:12px 16px; background:#f5f3ff; border-radius:10px; font-size:13px; color:#6c63ff; display:flex; align-items:center; gap:8px; }
  .portfolio-preview a { color:#6c63ff; text-decoration:none; font-weight:500; }
  .portfolio-preview a:hover { text-decoration:underline; }
  input[type="file"] { font-family:Poppins; font-size:13px; color:#555; }

  /* Alert messages */
  .msg { padding:12px 16px; border-radius:10px; font-size:13px; margin-bottom:16px; display:none; }
  .msg.success { background:#e0f7e9; color:#2e7d32; }
  .msg.error { background:#fdecea; color:#c62828; }

  /* Existing skills display */
  .current-skills { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
  .current-skill-tag { background:#ede9ff; color:#6c63ff; padding:5px 12px; border-radius:20px; font-size:13px; }
</style>
<script src="/static/js/auth.js"></script>
</head>
<body>

<div class="navbar">
  <h1>SkillBridge</h1>
  <div>
    <a href="/browse">Browse</a>
    <a href="/search">Search</a>
    <a href="/post-task">Post Task</a>
    <a href="/profile">My Profile</a>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div class="page">

  <!-- Alert -->
  <div id="msg" class="msg"></div>

  <!-- Profile Header -->
  <div class="profile-header" id="profileHeader">
    <div class="avatar-wrap" onclick="document.getElementById('avatarFileInput').click()" title="Click to change photo">
      <div class="avatar" id="avatarEl">?</div>
      <div class="avatar-overlay"><i class="fa-solid fa-camera"></i></div>
    </div>
    <input type="file" id="avatarFileInput" accept="image/*" onchange="uploadAvatar(this)">
    <div class="profile-info">
      <h2 id="headerName">Loading...</h2>
      <p id="headerUsername"></p>
      <p class="email" id="headerEmail"></p>
      <p id="headerUniversity" style="color:#888;font-size:0.82rem;margin-top:2px"></p>
    </div>
  </div>

  <!-- Skill Profile Form -->
  <div class="card">
    <div class="card-title"><i class="fa-solid fa-id-card"></i> Skill Profile</div>

    <div class="field">
      <label>Skills <span style="color:#999;font-weight:400">(press Enter or comma to add)</span></label>
      <div class="tag-input-wrapper" id="tagWrapper" onclick="document.getElementById('tagInput').focus()">
        <input type="text" id="tagInput" placeholder="e.g. Python, Design...">
      </div>
      <p class="tag-hint">Add at least one skill</p>
    </div>

    <div class="field">
      <label>Experience</label>
      <textarea id="experience" placeholder="Describe your experience, projects, or background..."></textarea>
    </div>

    <div class="field">
      <label>Bio <span style="color:#999;font-weight:400">(max 500 chars)</span></label>
      <textarea id="bio" placeholder="Write a short bio about yourself..." style="min-height:70px" maxlength="500"></textarea>
    </div>

    <button class="btn btn-primary" id="saveBtn" onclick="saveProfile()">
      <i class="fa-solid fa-floppy-disk" style="margin-right:6px"></i>Save Skill Profile
    </button>
  </div>

  <!-- Portfolio Card -->
  <div class="card">
    <div class="card-title"><i class="fa-solid fa-briefcase"></i> Portfolio</div>

    <div id="portfolioPreview" style="display:none" class="portfolio-preview">
      <i class="fa-solid fa-link"></i>
      <span id="portfolioPreviewText"></span>
    </div>

    <div class="portfolio-tabs">
      <button class="tab-btn active" onclick="switchTab('link')">Portfolio Link</button>
      <button class="tab-btn" onclick="switchTab('file')">Upload File</button>
    </div>

    <div id="tab-link" class="tab-panel active">
      <div class="field">
        <label>Portfolio / GitHub / LinkedIn URL</label>
        <input type="text" id="portfolioLink" placeholder="https://github.com/yourname">
      </div>
      <button class="btn btn-primary" onclick="savePortfolioLink()">
        <i class="fa-solid fa-save" style="margin-right:6px"></i>Save Link
      </button>
    </div>

    <div id="tab-file" class="tab-panel">
      <div class="field">
        <label>Upload PDF or Image</label>
        <input type="file" id="portfolioFile" accept=".pdf,.png,.jpg,.jpeg,.webp">
      </div>
      <button class="btn btn-primary" onclick="uploadPortfolio()">
        <i class="fa-solid fa-upload" style="margin-right:6px"></i>Upload File
      </button>
    </div>
  </div>

</div>

<script>
if (!getToken()) window.location.href = '/login';

let skills = [];

/* ── tag input ── */
const tagInput = document.getElementById('tagInput');
const tagWrapper = document.getElementById('tagWrapper');

tagInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    addSkill(tagInput.value.trim().replace(/,$/, ''));
  } else if (e.key === 'Backspace' && tagInput.value === '' && skills.length) {
    removeSkill(skills[skills.length - 1]);
  }
});

tagInput.addEventListener('blur', () => {
  if (tagInput.value.trim()) addSkill(tagInput.value.trim());
});

function addSkill(val) {
  if (!val || skills.includes(val)) { tagInput.value = ''; return; }
  skills.push(val);
  tagInput.value = '';
  renderTags();
}

function removeSkill(val) {
  skills = skills.filter(s => s !== val);
  renderTags();
}

function renderTags() {
  const existing = tagWrapper.querySelectorAll('.skill-tag');
  existing.forEach(el => el.remove());
  skills.forEach(s => {
    const tag = document.createElement('div');
    tag.className = 'skill-tag';
    tag.innerHTML = `${s}<button type="button" onclick="removeSkill('${s}')">&times;</button>`;
    tagWrapper.insertBefore(tag, tagInput);
  });
}

/* ── messages ── */
function showMsg(text, type) {
  const m = document.getElementById('msg');
  m.textContent = text;
  m.className = 'msg ' + type;
  m.style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setTimeout(() => m.style.display = 'none', 3500);
}

/* ── avatar upload ── */
async function uploadAvatar(input) {
  const file = input.files[0];
  if (!file) return;
  const form = new FormData();
  form.append('file', file);
  showMsg('Uploading photo...', 'success');
  try {
    const res = await authFetch(`${API}/profile/me/avatar`, { method: 'POST', body: form });
    const data = await res.json();
    if (res.ok && data.avatar_url) {
      document.getElementById('avatarEl').innerHTML = `<img src="${data.avatar_url}?t=${Date.now()}" alt="Profile photo">`;
      showMsg('Profile photo updated!', 'success');
    } else {
      showMsg(data.detail || 'Upload failed', 'error');
    }
  } catch(e) { showMsg('Error uploading photo', 'error'); }
  input.value = '';
}

/* ── load profile ── */
async function loadProfile() {
  try {
    const res = await authFetch(`${API}/profile/me`);
    if (!res.ok) { showMsg('Failed to load profile', 'error'); return; }
    const p = await res.json();

    /* header */
    const initials = (p.full_name || p.username || p.email || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
    const avatarEl = document.getElementById('avatarEl');
    if (p.avatar_url) {
      avatarEl.innerHTML = `<img src="${p.avatar_url}" alt="Profile photo">`;
    } else {
      avatarEl.textContent = initials;
    }
    document.getElementById('headerName').textContent = p.full_name || p.username || 'No name set';
    document.getElementById('headerUsername').textContent = p.username ? `@${p.username}` : '';
    document.getElementById('headerEmail').textContent = p.email;
    document.getElementById('headerUniversity').textContent = p.university || '';

    /* form */
    if (p.skills && p.skills.length) {
      skills = [...p.skills];
      renderTags();
    }
    document.getElementById('experience').value = p.experience || '';
    document.getElementById('bio').value = p.bio || '';

    /* portfolio */
    if (p.portfolio_link) {
      document.getElementById('portfolioLink').value = p.portfolio_link;
      showPortfolioPreview(`<a href="${p.portfolio_link}" target="_blank">${p.portfolio_link}</a>`);
    } else if (p.portfolio_url) {
      showPortfolioPreview(`<a href="${p.portfolio_url}" target="_blank">${p.portfolio_filename || 'View file'}</a>`);
    }

  } catch(e) { showMsg('Error loading profile', 'error'); }
}

function showPortfolioPreview(html) {
  const el = document.getElementById('portfolioPreview');
  document.getElementById('portfolioPreviewText').innerHTML = html;
  el.style.display = 'flex';
}

/* ── save skill profile ── */
async function saveProfile() {
  if (skills.length === 0) { showMsg('Add at least one skill', 'error'); return; }
  const experience = document.getElementById('experience').value.trim();
  const bio = document.getElementById('bio').value.trim();
  if (!experience) { showMsg('Experience is required', 'error'); return; }
  if (!bio) { showMsg('Bio is required', 'error'); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Saving...';

  try {
    const res = await authFetch(`${API}/profile/me`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ skills, experience, bio })
    });
    const data = await res.json();
    if (res.ok) showMsg('Skill profile saved successfully!', 'success');
    else showMsg(data.detail || 'Failed to save', 'error');
  } catch(e) { showMsg('Error saving profile', 'error'); }
  finally { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-floppy-disk" style="margin-right:6px"></i>Save Skill Profile'; }
}

/* ── portfolio link ── */
async function savePortfolioLink() {
  const link = document.getElementById('portfolioLink').value.trim();
  if (!link) { showMsg('Enter a portfolio URL', 'error'); return; }
  try {
    const res = await authFetch(`${API}/profile/me/portfolio/link`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ portfolio_link: link })
    });
    const data = await res.json();
    if (res.ok) { showMsg('Portfolio link saved!', 'success'); showPortfolioPreview(`<a href="${link}" target="_blank">${link}</a>`); }
    else showMsg(data.detail || 'Failed to save link', 'error');
  } catch(e) { showMsg('Error saving link', 'error'); }
}

/* ── portfolio upload ── */
async function uploadPortfolio() {
  const file = document.getElementById('portfolioFile').files[0];
  if (!file) { showMsg('Select a file first', 'error'); return; }
  const form = new FormData();
  form.append('file', file);
  try {
    const res = await authFetch(`${API}/profile/me/portfolio/upload`, {
      method: 'POST',
      body: form
    });
    const data = await res.json();
    if (res.ok) {
      showMsg('Portfolio uploaded!', 'success');
      if (data.portfolio_url) showPortfolioPreview(`<a href="${data.portfolio_url}" target="_blank">${data.portfolio_filename || 'View file'}</a>`);
    } else showMsg(data.detail || 'Upload failed', 'error');
  } catch(e) { showMsg('Error uploading file', 'error'); }
}

/* ── tabs ── */
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0 && tab==='link') || (i===1 && tab==='file')));
  document.getElementById('tab-link').classList.toggle('active', tab === 'link');
  document.getElementById('tab-file').classList.toggle('active', tab === 'file');
}

/* ── logout ── */
function logout() {
  authFetch(`${API}/auth/logout`, { method: 'POST' }).catch(() => {});
  localStorage.clear();
  window.location.href = '/login';
}

loadProfile();
</script>
</body>
</html>
