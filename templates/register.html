<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>SkillBridge - Register</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/register.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="navbar">
    <h1>SkillBridge</h1>
    <div>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="/login">Login</a>
    </div>
</div>

<div class="main">
    <div class="container">

        <h2>Create Account</h2>
        <p class="tagline">Join students collaborating through skills</p>

        <form method="post" action="/auth/register">

            <label>Full Name</label>
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" name="full_name" placeholder="Enter your full name" required>
            </div>

            <label>Username</label>
            <div class="input-group">
                <i class="fa-solid fa-at"></i>
                <input type="text" name="username" placeholder="Choose a username" required>
            </div>

            <label>Email</label>
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>

            <label>Password</label>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" name="password" placeholder="Create a password" minlength="6" required>
            </div>

            <label>University</label>
            <div class="input-group">
                <i class="fa-solid fa-school"></i>
                <input type="text" name="university" placeholder="Enter your university" required>
            </div>

            <label>Student ID</label>
            <div class="input-group">
                <i class="fa-solid fa-id-card"></i>
                <input type="text" name="student_id" placeholder="Enter your student ID">
            </div>

            <label>Skills</label>
            <div class="input-group">
                <i class="fa-solid fa-code"></i>
                <input type="text" name="skills" placeholder="Example: Python, Design, Writing">
            </div>

            <label>Bio</label>
            <div class="input-group">
                <i class="fa-solid fa-info-circle"></i>
                <input type="text" name="bio" placeholder="Short bio about yourself">
            </div>

            <button type="submit">Register</button>

        </form>

        <div class="login">
            Already have an account? <a href="/login">Login</a>
        </div>

        <div class="about">
            <strong>About SkillBridge</strong><br>
            SkillBridge is a platform where students can post and complete micro-tasks,
            share their skills, and collaborate within a trusted academic community.
        </div>

    </div>
</div>

</body>

</html>
