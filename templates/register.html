<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>SkillBridge - Register</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/register.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="navbar">
    <h1>SkillBridge</h1>
    <div>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="/login">Login</a>
    </div>
</div>

<div class="main">
    <div class="container">

        <h2>Create Account</h2>
        <p class="tagline">Join students collaborating through skills</p>

        <div id="error-msg" style="display:none; background:#ffe0e0; color:#c00; padding:10px; border-radius:8px; margin-bottom:10px;"></div>
        <div id="success-msg" style="display:none; background:#e0ffe0; color:#060; padding:10px; border-radius:8px; margin-bottom:10px;"></div>

        <form id="registerForm">

            <label>Full Name</label>
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" name="full_name" placeholder="Enter your full name" required>
            </div>

            <label>Username</label>
            <div class="input-group">
                <i class="fa-solid fa-at"></i>
                <input type="text" name="username" placeholder="Choose a username" required>
            </div>

            <label>Email</label>
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>

            <label>Password</label>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" name="password" placeholder="Create a password" minlength="6" required>
            </div>

            <label>University</label>
            <div class="input-group">
                <i class="fa-solid fa-school"></i>
                <input type="text" name="university" placeholder="Enter your university" required>
            </div>

            <label>Student ID</label>
            <div class="input-group">
                <i class="fa-solid fa-id-card"></i>
                <input type="text" name="student_id" placeholder="Enter your student ID">
            </div>

            <label>Skills</label>
            <div class="input-group">
                <i class="fa-solid fa-code"></i>
                <input type="text" name="skills" placeholder="Example: Python, Design, Writing">
            </div>

            <label>Bio</label>
            <div class="input-group">
                <i class="fa-solid fa-info-circle"></i>
                <input type="text" name="bio" placeholder="Short bio about yourself">
            </div>

            <button type="submit">Register</button>

        </form>

        <div class="login">
            Already have an account? <a href="/login">Login</a>
        </div>

        <div class="about">
            <strong>About SkillBridge</strong><br>
            SkillBridge is a platform where students can post and complete micro-tasks,
            share their skills, and collaborate within a trusted academic community.
        </div>

    </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const form = e.target;
    const errorDiv = document.getElementById('error-msg');
    const successDiv = document.getElementById('success-msg');
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';

    const skillsRaw = form.skills.value;
    const skillsArray = skillsRaw ? skillsRaw.split(',').map(s => s.trim()).filter(s => s) : [];

    const data = {
        full_name: form.full_name.value,
        username: form.username.value,
        email: form.email.value,
        password: form.password.value,
        university: form.university.value,
        student_id: form.student_id.value || null,
        skills: skillsArray,
        bio: form.bio.value || null
    };

    try {
        const response = await fetch('/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok) {
            successDiv.textContent = 'Registration successful! Please check your email to verify, then login.';
            successDiv.style.display = 'block';
            form.reset();
            setTimeout(() => window.location.href = '/login', 3000);
        } else {
            errorDiv.textContent = result.detail || 'Registration failed. Please try again.';
            errorDiv.style.display = 'block';
        }
    } catch (err) {
        errorDiv.textContent = 'Something went wrong. Please try again.';
        errorDiv.style.display = 'block';
    }
});
</script>

</body>
</html>
